# Supabase CLI config for Axis Cloud. `project_id` is a local identifier; `supabase link --project-ref
# <ref>` connects this to a hosted project. Regenerate/extend with `supabase init` if your CLI version
# expects newer keys. No secrets here — those live in the dashboard / .env (gitignored).
project_id = "axis-cloud"

[db]
port = 54322
major_version = 15

[auth]
# Email/password to start (works headless from ForgeFX). Turn confirmations on once SMTP is configured.
enable_signup = true
# Confirmation emails redirect to the Site URL by default; keep it the STABLE public web domain so the
# link never points at localhost / the desktop app's random port. The app passes an explicit
# emailRedirectTo (see ForgeFX runtime/cloud.ts) which MUST appear in additional_redirect_urls below, or
# Supabase silently falls back to site_url. Auth is headless (email/password) so the redirect carries no
# session — the target is just a friendly "confirmed" landing page.
# NOTE: this drives the LOCAL stack only. Set the same values on the hosted project under
# Dashboard → Authentication → URL Configuration (or `supabase config push`).
site_url = "https://axisapp.live"
additional_redirect_urls = [
  "https://axisapp.live/auth/confirmed",
  "http://localhost:5173/auth/confirmed"  # local dev (set AXIS_AUTH_CONFIRM_URL to match)
]
[auth.email]
enable_signup = true
enable_confirmations = true

[storage]
enabled = true
# Preset .syx blobs (brotli-compressed by ForgeFX). Raise if you store large full-device backups.
file_size_limit = "50MiB"

[functions.delete-account]
# GDPR Art. 17 account erasure. JWT-gated: the caller is identified from their own token,
# so a user can only delete themselves. Runs with the service role (server-side only).
verify_jwt = true

[functions.gc-blobs]
# Orphan-blob sweep (quota enforcement is metadata-gated; interrupted syncs can leave unreferenced
# blobs). NOT user-facing: gated by the GC_SECRET header, invoked manually or on a schedule — no
# user JWT involved.
verify_jwt = false
